<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iulh.lol | Links</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 90%;
      max-width: 400px;
      text-align: center;
      padding: 30px;
    }

    .profile {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0 5px;
      font-size: 28px;
    }

    p {
      color: #aaa;
      margin-bottom: 25px;
    }

    .link {
      display: block;
      background: white;
      color: black;
      text-decoration: none;
      padding: 15px;
      margin: 12px 0;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    .link:hover {
      transform: scale(1.05);
      background: #ddd;
    }

    footer {
      margin-top: 25px;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- Replace this image with your own -->
    <img class="profile" src="https://via.placeholder.com/100" alt="Profile">

    <h1>Your Name</h1>
    <p>🎥 Future YouTuber | Welcome to my page</p>

    <a class="link" href="https://youtube.com/" target="_blank">
      YouTube
    </a>

    <a class="link" href="https://instagram.com/" target="_blank">
      Instagram
    </a>

    <a class="link" href="https://tiktok.com/" target="_blank">
      TikTok
    </a>

    <a class="link" href="https://discord.com/" target="_blank">
      Discord
    </a>

    <footer>
      © 2026 Your Name
    </footer>

  </div>

</body>
</html>
